{% load static %}
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Acervo Virtual</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="icon" href="{% static 'img/logo.png' %}" type="image/png">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"
        crossorigin="anonymous" />
</head>

<body class="login-page">

    <main class="login-container">
        <div class="login-form-box">

            <img src="{% static 'img/acervo.png' %}" class="login-logo" alt="Logo da Biblioteca">

            <h2>Login</h2>

            <form method="POST" action="{% url 'login_view' %}">
                {% csrf_token %}

                {% if messages %}
                <ul class="messages">
                    {% for message in messages %}
                    <li{% if message.tags %} class="{{ message.tags }}" {% endif %}>{{ message }}</li>
                        {% endfor %}
                </ul>
                {% endif %}

                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" required>
                    <i class="fa fa-eye" id="toggleSenha"></i>
                </div>

                <button type="submit" class="btn">Entrar</button>

                <div class="forgot-password">
                    <a href="{% url 'password_reset' %}">Esqueci minha senha</a>
                </div>

            </form>

        </div>
        <div class="login-image"></div>
    </main>

    {% if messages %}
    <div id="modal-feedback" class="modal" style="display: flex;">
        <div class="modal-conteudo" id="conteudo-feedback">
            <span class="fechar-modal" onclick="fecharModalFeedback()">&times;</span>
            {% for message in messages %}
            <p class="mensagem-feedback {{ message.tags }}">{{ message }}</p>
            {% endfor %}
            <button class="btn-voltar-modal" onclick="fecharModalFeedback()">Fechar</button>
        </div>
    </div>
    {% endif %}
    <script src="{% static 'script/script.js' %}"></script>

</body>

</html>
